<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <style>
      .hex-bg { fill: #1e355c; }
      .v-white { fill: none; stroke: #ffffff; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .v-orange { fill: #f68b1e; }
    </style>
  </defs>

  <!-- Hexagon Centered at cx=50, cy=50, radius S=42 (Ratio 0.73) -->
  <g>
    <polygon class="hex-bg" points="50,8 80.66,29 80.66,71 50,92 19.34,71 19.34,29" />
    
    <!-- Left Device (Smartphone) -->
    <rect class="v-white" x="23.37" y="21.31" width="24.99" height="44.29" rx="2" ry="2" />
    
    <!-- Home button dot on smartphone -->
    <circle class="v-orange" cx="36.18" cy="59.24" r="2" />
    
    <!-- Right Device (Laptop Screen) -->
    <rect class="v-white" x="51.01" y="31.56" width="19.5" height="29.41" rx="1.5" ry="1.5" />
    
    <!-- Orange Laptop Base -->
    <rect class="v-orange" x="51.01" y="65.37" width="25.62" height="3.07" rx="0.5" ry="0.5" />
  </g>
</svg>
